version: '3.8'

services:
  creator-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SERVICE_NAME=creator-service
      - PORT=8001
      - DATABASE_URL=postgres://user:password@postgres:5432/tipjar
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  tip-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SERVICE_NAME=tip-service
      - PORT=8002
      - DATABASE_URL=postgres://user:password@postgres:5432/tipjar
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis

  wallet-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SERVICE_NAME=wallet-service
      - PORT=8003
      - DATABASE_URL=postgres://user:password@postgres:5432/tipjar
    ports:
      - "8003:8003"
    depends_on:
      - postgres

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SERVICE_NAME=api-gateway
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - creator-service
      - tip-service
      - wallet-service

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=tipjar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (guest/guest)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
